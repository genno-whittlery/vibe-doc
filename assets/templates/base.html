<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}{{if .Title}} · {{end}}{{.SiteTitle}}</title>
  <link rel="stylesheet" href="/__static/style.css">
  {{if .HasMath}}<link rel="stylesheet" href="/__static/katex.min.css">{{end}}
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="searchbox"><input type="search" id="search" placeholder="search…"></div>
      {{template "sidebar" .Sidebar}}
    </nav>
    <main>
      {{template "content" .}}
    </main>
    <aside class="toc">
      {{if .TOC}}
        <strong>on this page</strong>
        {{range .TOC}}<a href="#{{.ID}}" style="padding-left: {{mul (sub .Level 1) 0.7}}rem">{{.Text}}</a>{{end}}
      {{end}}
    </aside>
  </div>
  {{if .HasMermaid}}<script src="/__static/mermaid.min.js" onload="mermaid.initialize({startOnLoad:false, theme:'dark'}); mermaid.run({querySelector:'pre.mermaid'})"></script>{{end}}
  {{if .HasMath}}<script defer src="/__static/katex.min.js" onload="document.querySelectorAll('span.math').forEach(s=>{try{katex.render(s.textContent,s,{throwOnError:false,displayMode:s.classList.contains('math-block')})}catch(e){console.warn('katex:',e)}})"></script>{{end}}
  <script src="/__static/search.js" defer></script>
  <script src="/__static/auto-reload.js" defer></script>
</body>
</html>
